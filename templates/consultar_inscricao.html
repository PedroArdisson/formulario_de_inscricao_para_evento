<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Consultar inscrição - EMEERJ 2026</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/consultar_inscricao.css') }}"
    >
</head>

<body>

    <main class="pagina-consulta">

        <section class="card-consulta">

            <h1>Consultar minha inscrição</h1>

            <p>
                Informe o CPF da pessoa inscrita e o e-mail
                utilizado no formulário.
            </p>

            {% if erro %}

                <div class="mensagem-erro">
                    {{ erro }}
                </div>

            {% endif %}

            <form
                method="POST"
                action="{{ url_for('consultar_inscricao') }}"
            >

                <div class="campo-consulta">

                    <label for="cpf_consulta">
                        CPF
                    </label>

                    <input
                        type="text"
                        id="cpf_consulta"
                        name="cpf"
                        placeholder="000.000.000-00"
                        maxlength="14"
                        inputmode="numeric"
                        required
                    >

                </div>

                <div class="campo-consulta">

                    <label for="email_consulta">
                        E-mail utilizado na inscrição
                    </label>

                    <input
                        type="email"
                        id="email_consulta"
                        name="email"
                        required
                    >

                </div>

                <button
                    type="submit"
                    class="botao-consultar"
                >
                    Consultar inscrição
                </button>

            </form>

            <a
                href="/"
                class="voltar-formulario"
            >
                Voltar ao formulário
            </a>

        </section>

    </main>

    <script>
        const campoCpf =
            document.getElementById("cpf_consulta");

        campoCpf.addEventListener("input", () => {
            let valor = campoCpf.value
                .replace(/\D/g, "")
                .slice(0, 11);

            if (valor.length > 9) {
                valor = valor.replace(
                    /(\d{3})(\d{3})(\d{3})(\d{1,2})/,
                    "$1.$2.$3-$4"
                );
            } else if (valor.length > 6) {
                valor = valor.replace(
                    /(\d{3})(\d{3})(\d{1,3})/,
                    "$1.$2.$3"
                );
            } else if (valor.length > 3) {
                valor = valor.replace(
                    /(\d{3})(\d{1,3})/,
                    "$1.$2"
                );
            }

            campoCpf.value = valor;
        });
    </script>

</body>
</html>
